<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="100%" height="250">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f2027"/>
            <stop offset="50%" stop-color="#203a43"/>
            <stop offset="100%" stop-color="#2c5364"/>
        </linearGradient>
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00c6ff">
                <animate attributeName="stop-color" values="#00c6ff;#0072ff;#00c6ff" dur="4s" repeatCount="indefinite"/>
            </stop>
            <stop offset="100%" stop-color="#0072ff">
                <animate attributeName="stop-color" values="#0072ff;#00c6ff;#0072ff" dur="4s" repeatCount="indefinite"/>
            </stop>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        </pattern>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#grad)" rx="15"/>
    <rect width="100%" height="100%" fill="url(#grid)" rx="15">
        <animate attributeName="x" values="0;40" dur="2s" repeatCount="indefinite" />
        <animate attributeName="y" values="0;40" dur="2s" repeatCount="indefinite" />
    </rect>
    
    <g transform="translate(850, 125)">
        <polygon points="0,-40 34,-20 34,20 0,40 -34,20 -34,-20" fill="none" stroke="#00c6ff" stroke-width="2" filter="url(#glow)">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="0,-25 21,-12 21,12 0,25 -21,12 -21,-12" fill="none" stroke="#0072ff" stroke-width="2" filter="url(#glow)">
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="8s" repeatCount="indefinite"/>
        </polygon>
    </g>
    
    <g transform="translate(150, 125)">
        <circle cx="0" cy="0" r="30" fill="none" stroke="#00c6ff" stroke-width="2" stroke-dasharray="10 5" filter="url(#glow)">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="20" fill="none" stroke="#0072ff" stroke-width="2" stroke-dasharray="5 5" filter="url(#glow)">
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="10" fill="#00c6ff" filter="url(#glow)">
            <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
        </circle>
    </g>

    <text x="50%" y="45%" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="42" font-weight="900" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">
        Generative 3D Interview QA
    </text>
    
    <text x="50%" y="65%" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#e2e8f0" text-anchor="middle" opacity="0.9">
        Awesome Applied AI Researcher
    </text>

    <text x="50%" y="80%" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="300" fill="#94a3b8" text-anchor="middle">
        Curated No-Fluff Collection
        <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </text>
</svg>
